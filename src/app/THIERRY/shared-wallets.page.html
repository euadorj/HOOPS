<ion-header [translucent]="true" class="shared-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <div class="header-content">
      <ion-title class="header-title">Shared Wallet</ion-title>
      <p class="header-subtitle">Pool funds with friends</p>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="shared-content">
  <div class="shared-container">
    <div class="hero-card join-wallet">
      <div class="card-top">
        <div class="icon">#</div>
        <div class="text">
          <h3>Join Wallet</h3>
          <p>Enter the wallet code</p>
        </div>
      </div>
      <div class="input-row">
        <label>Wallet Code</label>
        <input [(ngModel)]="walletCode" maxlength="6" inputmode="numeric" name="walletCode" placeholder="Enter wallet code" />
        <p class="form-error" *ngIf="joinError">{{ joinError }}</p>
        <p class="form-message" *ngIf="joinMessage">{{ joinMessage }}</p>
        <button class="primary" type="button" (click)="joinWallet()">Join Wallet</button>
      </div>
    </div>

    <div class="or">OR</div>

    <div class="hero-card create-wallet">
      <div class="card-top">
        <div class="icon">+</div>
        <div class="text white">
          <h3>Create New Wallet</h3>
          <p>Start a group wallet</p>
        </div>
      </div>
      <button class="outline" type="button" (click)="createWallet()">+ Create Wallet</button>
    </div>

    <div class="access-message" *ngIf="accessMessage">{{ accessMessage }}</div>
    <h4 class="recent-title">Recent Wallets</h4>
    <div class="state-message" *ngIf="loading">Loading wallets...</div>
    <div class="state-message" *ngIf="!loading && !wallets.length">
      You have not created or joined any shared wallets yet.
    </div>
    <div class="wallet-list" *ngIf="!loading && wallets.length">
      <button class="wallet-item" type="button" *ngFor="let wallet of wallets" (click)="openWallet(wallet)">
        <div class="avatar">{{ wallet.name.charAt(0).toUpperCase() }}</div>
        <div class="wallet-info">
          <h5>{{ wallet.name }}</h5>
          <p>{{ wallet.memberIds.length }} members • {{ formatBalance(wallet.balanceCents) }}</p>
        </div>
        <div class="chev">›</div>
      </button>
    </div>
  </div>
</ion-content>
