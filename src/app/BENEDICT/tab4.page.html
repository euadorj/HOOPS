<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>

    <ion-title>Cashback</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Lifetime earnings card -->
  <ion-card class="earnings-card">
    <ion-card-header>
      <ion-card-title class="earnings-title">Lifetime earnings</ion-card-title>
      <div class="earnings-amount">{{ formattedLifetime }}</div>
    </ion-card-header>

    <!-- Segmented control -->
    <ion-segment
      [value]="activeSegment"
      (ionChange)="segmentChanged($event)"
      class="cashback-segment"
    >
      <ion-segment-button value="vouchers">
        <ion-icon name="ticket-outline" aria-hidden="true"></ion-icon>
        <div>DATA INSIGHTS</div>
      </ion-segment-button>

      <ion-segment-button value="rewards">
        <ion-icon name="gift-outline" aria-hidden="true"></ion-icon>
        <div>Rewards</div>
      </ion-segment-button>
    </ion-segment>
  </ion-card>

  <!-- List -->
  <div class="list-container">
    <ion-list lines="none">
      <!-- Today -->
      <ion-item-divider>
        <ion-label class="divider-label">{{ expiringSummary.todayCountText }}</ion-label>
      </ion-item-divider>

      <ion-item
        *ngFor="let item of todayItems"
        class="cashback-row"
        lines="none"
      >
        <ion-avatar slot="start" class="row-avatar">
          <ion-icon
            [name]="item.icon"
            [ngClass]="{
              'tone-primary': item.tone === 'primary',
              'tone-danger': item.tone === 'danger',
              'tone-warning': item.tone === 'warning',
              'tone-success': item.tone === 'success',
              'tone-medium': item.tone === 'medium'
            }"
          ></ion-icon>
        </ion-avatar>

        <ion-label>
          <div class="row-title">{{ item.title }}</div>
          <div
            class="row-subtitle"
            [ngClass]="{
              'sub-primary': item.badgeColor === 'primary',
              'sub-danger': item.badgeColor === 'danger',
              'sub-warning': item.badgeColor === 'warning',
              'sub-success': item.badgeColor === 'success',
              'sub-medium': item.badgeColor === 'medium'
            }"
          >
            {{ item.badgeText }}
          </div>
        </ion-label>

        <div slot="end" class="row-end">
          <!-- amount if present -->
          <div *ngIf="item.amount !== undefined" class="row-amount">
            ${{ item.amount!.toFixed(2) }}
          </div>
        </div>

        <!-- Danger triangle -->
        <ion-icon
          *ngIf="isDangerItem(item)"
          name="warning"
          class="danger-triangle"
          slot="end"
        ></ion-icon>
      </ion-item>

      <!-- Yesterday -->
      <ion-item-divider>
        <ion-label class="divider-label">{{ expiringSummary.yesterdayCountText }}</ion-label>
      </ion-item-divider>

      <ion-item
        *ngFor="let item of yesterdayItems"
        class="cashback-row"
        lines="none"
      >
        <ion-avatar slot="start" class="row-avatar">
          <ion-icon
            [name]="item.icon"
            [ngClass]="{
              'tone-primary': item.tone === 'primary',
              'tone-danger': item.tone === 'danger',
              'tone-warning': item.tone === 'warning',
              'tone-success': item.tone === 'success',
              'tone-medium': item.tone === 'medium'
            }"
          ></ion-icon>
        </ion-avatar>

        <ion-label>
          <div class="row-title">{{ item.title }}</div>
          <div
            class="row-subtitle"
            [ngClass]="{
              'sub-primary': item.badgeColor === 'primary',
              'sub-danger': item.badgeColor === 'danger',
              'sub-warning': item.badgeColor === 'warning',
              'sub-success': item.badgeColor === 'success',
              'sub-medium': item.badgeColor === 'medium'
            }"
          >
            {{ item.badgeText }}
          </div>
        </ion-label>

        <div slot="end" class="row-end">
          <div *ngIf="item.amount !== undefined" class="row-amount">
            ${{ item.amount!.toFixed(2) }}
          </div>
        </div>

        <ion-icon
          *ngIf="isDangerItem(item)"
          name="warning"
          class="danger-triangle"
          slot="end"
        ></ion-icon>

      </ion-item>
    </ion-list>
  </div>
</ion-content>
