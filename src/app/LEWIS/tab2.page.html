<ion-header [translucent]="true" class="bill-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <div class="header-content">
      <ion-title class="header-title">Bill Splitting</ion-title>
      <p class="header-subtitle">Split bills with friends</p>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="bill-content">
  <div class="bill-container">
    <!-- Join Session Card -->
    <div class="join-card">
      <div class="card-header">
        <div class="card-icon join-icon">#</div>
        <div class="card-text">
          <h2>Join Session</h2>
          <p>Enter the session code</p>
        </div>
      </div>

      <div class="input-label">Session Code</div>
      <input 
        type="text" 
        class="session-input" 
        placeholder="Enter 6-digit code" 
        [(ngModel)]="joinCode" 
        maxlength="6" 
        inputmode="numeric"
      />

      <button class="join-button" (click)="joinSession()">Join Session</button>
    </div>

    <!-- OR Divider -->
    <div class="divider">OR</div>

    <!-- Create Session Card -->
    <div class="create-card">
      <div class="card-header">
        <div class="card-icon create-icon">👥</div>
        <div class="card-text-white">
          <h2>Create New Session</h2>
          <p>Start a new bill split</p>
        </div>
      </div>

      <button class="create-button" (click)="createSession()">Create Session</button>
    </div>

    <!-- Active Sessions -->
    <div class="active-sessions">
      <h3>Active Sessions</h3>

      <div class="session-item" (click)="openSession('dinner-mario')">
        <div class="session-avatar">👤</div>
        <div class="session-details">
          <h4>Dinner at Mario's</h4>
          <p class="restaurant-name">Mario's Italian Restaurant</p>
          <div class="session-meta">
            <span class="meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
              </svg>
              4 people
            </span>
            <span class="meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              Started 25 min ago
            </span>
          </div>
        </div>
        <div class="session-total">
          <span class="total-amount">$156.50</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</ion-content>
