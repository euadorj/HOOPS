<ion-header [translucent]="true" class="split-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <div class="split-title-group">
      <ion-title>Bill Splitting</ion-title>
      <div class="split-subtitle">Split bills with friends</div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="split-content">
  <div class="split-shell">
    <section class="card card-join">
      <div class="card-labels">
        <span class="card-tag">Join Session</span>
        <p>Enter the session code</p>
      </div>

      <ion-item class="session-input" lines="none">
        <ion-input placeholder="Enter 6-digit code" [(ngModel)]="joinCode" maxlength="6" inputmode="numeric"></ion-input>
      </ion-item>

      <ion-button expand="block" class="primary-button" (click)="joinSession()">Join Session</ion-button>
    </section>

    <div class="split-or">OR</div>

    <section class="card card-create">
      <div class="create-top">
        <div class="create-icon">
          <ion-icon name="people-outline"></ion-icon>
        </div>
        <div>
          <h2>Create New Session</h2>
          <p>Start a new bill split</p>
        </div>
      </div>
      <ion-button expand="block" class="secondary-button" (click)="createSession()">Create Session</ion-button>
    </section>

    <section class="active-section">
      <div class="active-header">
        <h3>Active Sessions</h3>
      </div>
      <ion-card button detail class="active-card" (click)="openSession('dinner-mario')">
        <div class="active-row">
          <div class="active-meta">
            <ion-avatar class="active-avatar">
              <ion-icon name="restaurant-outline"></ion-icon>
            </ion-avatar>
            <div class="active-text">
              <h4>Dinner at Mario's</h4>
              <p>Mario's Italian Restaurant</p>
              <span>Started 25 min ago • 4 people</span>
            </div>
          </div>
          <div class="active-total">
            <span>$156.50</span>
            <ion-icon name="chevron-forward-outline"></ion-icon>
          </div>
        </div>
      </ion-card>
    </section>
  </div>
</ion-content>
