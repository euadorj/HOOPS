<ion-header [translucent]="true" class="bill-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <div class="header-content">
      <ion-title class="header-title">Bill Splitting</ion-title>
      <p class="header-subtitle">Split bills with friends</p>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="bill-content">
  <div class="bill-container">
    <!-- Join Session Card -->
    <div class="join-card">
      <div class="card-header">
        <div class="card-icon join-icon">#</div>
        <div class="card-text">
          <h2>Join Session</h2>
          <p>Enter the session code</p>
        </div>
      </div>

      <div class="input-label">Session Code</div>
      <input 
        type="text" 
        class="session-input" 
        placeholder="Enter 6-digit code" 
        [(ngModel)]="joinCode" 
        maxlength="6" 
        inputmode="numeric"
        name="joinCode"
      />

      <p class="join-error" *ngIf="joinError">{{ joinError }}</p>
      <button class="join-button" (click)="joinSession()">Join Session</button>
    </div>

    <!-- OR Divider -->
    <div class="divider">OR</div>

    <!-- Create Session Card -->
    <div class="create-card">
      <div class="card-header">
        <div class="card-icon create-icon">👥</div>
        <div class="card-text-white">
          <h2>Create New Session</h2>
          <p>Start a new bill split</p>
        </div>
      </div>

      <button class="create-button" (click)="createSession()">Create Session</button>
    </div>

    <!-- Active Sessions -->
    <div class="active-sessions">
      <h3>Active Sessions</h3>
      <div class="session-item" *ngFor="let session of sessions" (click)="openSession(session.id)">
        <div class="session-avatar">👤</div>
        <div class="session-details">
          <h4>{{ session.title }}</h4>
          <p class="restaurant-name">{{ session.restaurant }}</p>
          <div class="session-meta">
            <span class="meta-item">{{ session.menuCategories.length }} categories</span>
            <span class="meta-item">Code {{ session.id }}</span>
          </div>
        </div>
        <div class="session-total">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</ion-content>
