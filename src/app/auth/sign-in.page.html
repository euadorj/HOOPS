<ion-content [fullscreen]="true" class="auth-page">
  <div class="auth-shell">

    <div class="auth-header">
      <ion-buttons slot="start">
        <ion-back-button
          defaultHref="/sign-in"
          text=""
          color="light">
        </ion-back-button>
      </ion-buttons>

      <h1>Sign in</h1>
    </div>

    <div class="auth-card">
      <div class="auth-intro">
        <h2>Welcome Back</h2>
        <p>Hello there, sign in to continue</p>
      </div>

      <div
        class="success-message"
        *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <form
        [formGroup]="signInForm"
        (ngSubmit)="onSubmit()"
        novalidate>

        <!-- Username -->
        <div class="input-group">
          <ion-item lines="none" class="rounded-input">
            <ion-icon
              name="person-outline"
              slot="start">
            </ion-icon>

            <ion-input
              formControlName="username"
              placeholder="Username"
              autocomplete="username">
            </ion-input>
          </ion-item>

          <div
            class="validation-error"
            *ngIf="
              (usernameControl?.touched || submitted) &&
              usernameControl?.hasError('required')
            ">
            Username is required
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <ion-item lines="none" class="rounded-input">
            <ion-icon
              name="lock-closed-outline"
              slot="start">
            </ion-icon>

            <ion-input
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Password"
              autocomplete="current-password">
            </ion-input>

            <ion-button
              fill="clear"
              slot="end"
              type="button"
              (click)="togglePasswordVisibility()">

              <ion-icon
                [name]="showPassword
                  ? 'eye-off-outline'
                  : 'eye-outline'">
              </ion-icon>
            </ion-button>
          </ion-item>

          <div
            class="validation-error"
            *ngIf="
              (passwordControl?.touched || submitted) &&
              passwordControl?.hasError('required')
            ">
            Password is required
          </div>
        </div>

        <!-- Incorrect login -->
        <div
          class="validation-error login-error"
          *ngIf="loginError">
          {{ loginError }}
        </div>

        <!-- Sign In button -->
        <ion-button
          expand="block"
          class="auth-button"
          type="submit">
          Sign In
        </ion-button>
      </form>

      <div class="auth-footer">
        <p>
          Don’t have an account?
          <a routerLink="/sign-up">Sign Up</a>
        </p>
      </div>
    </div>
  </div>
</ion-content>
